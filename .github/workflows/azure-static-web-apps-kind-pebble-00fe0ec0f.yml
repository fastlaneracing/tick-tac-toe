name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Verify Azure deployment token is available
        env:
          AZURE_DEPLOYMENT_TOKEN: ${{ secrets.SECRET }}
        run: |
          if [ -z "$AZURE_DEPLOYMENT_TOKEN" ]; then
            echo "::error::AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_PEBBLE_00FE0EC0F is missing or unavailable to this workflow run."
            exit 1
          fi
          TOKEN_LENGTH=${#AZURE_DEPLOYMENT_TOKEN}
          if [ "$TOKEN_LENGTH" -lt 100 ]; then
            echo "::error::Azure deployment token is present, but it is only $TOKEN_LENGTH characters long. That usually means the wrong value was pasted into the GitHub secret."
            exit 1
          fi
          echo "Azure Static Web Apps deployment token is available and has a deployment-token-sized value."

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SECRET }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: ""
          output_location: ""
          skip_app_build: true
          skip_api_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SECRET }}
          action: close
